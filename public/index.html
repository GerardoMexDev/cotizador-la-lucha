<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cotizador | Gomería La Lucha</title>
<meta name="description" content="Cotizador de precios de neumáticos - Gomería La Lucha" />
<meta name="theme-color" content="#FFFFFF" />

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/favicon-48.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="La Lucha" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/estilos.css" />
</head>
<body>

<header class="cabecera">
  <div class="cabecera__marca">
    <img class="cabecera__icono" src="img/icono-neumatico.png" alt="" />
    <div class="cabecera__texto">
      <span class="cabecera__nombre">LA LUCHA</span>
      <span class="cabecera__rubro">Gomería</span>
    </div>
  </div>
</header>

<main class="contenedor">

  <section class="buscador" aria-label="Buscar neumático por medida">
    <label class="buscador__label" for="campo-medida">Medida del neumático</label>
    <div class="buscador__caja">
      <svg class="buscador__icono" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        id="campo-medida"
        type="text"
        inputmode="text"
        autocomplete="off"
        placeholder="Ej: 185/65R15 o 185 65 15"
        aria-describedby="ayuda-medida"
      />
      <button class="buscador__limpiar" id="boton-limpiar" type="button" aria-label="Limpiar búsqueda" hidden>&times;</button>
    </div>
    <p class="buscador__ayuda" id="ayuda-medida">Escribí la medida, con o sin barras (ej. 185 65 15).</p>
  </section>

  <section class="resultados" id="resultados" aria-live="polite">
    <div class="estado-vacio" id="estado-inicial">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <p>Ingresá una medida para ver los precios disponibles.</p>
    </div>
  </section>

  <section class="espera" id="seccion-espera" aria-label="Clientes en espera de aviso" hidden>
    <h2 class="espera__titulo">Clientes en espera <span class="espera__contador" id="espera-contador">0</span></h2>
    <div class="espera__lista" id="espera-lista"></div>
  </section>

</main>

<footer class="pie">
  <p>Desarrollado por Mazdesign - 2026</p>
</footer>

<div class="cargando" id="pantalla-carga" aria-hidden="true">
  <div class="cargando__spinner"></div>
</div>

<script src="js/buscador.js"></script>
<script src="js/app.js"></script>
</body>
</html>
